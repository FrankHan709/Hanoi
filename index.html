<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>经典汉诺塔 | 智慧移盘 · 可撤销</title>
    <style>
        * {
            user-select: none;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #1a472a 0%, #0e2a1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Roboto', 'Poppins', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .game-container {
            background: rgba(30, 20, 15, 0.65);
            backdrop-filter: blur(4px);
            border-radius: 68px;
            padding: 20px 30px 30px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), inset 0 1px 2px rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 215, 150, 0.3);
        }

        .game-panel {
            background: #fdf8ed;
            border-radius: 48px;
            padding: 20px 24px 24px;
            box-shadow: inset 0 0 0 1px #fff8, 0 12px 28px rgba(0, 0, 0, 0.3);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 40px;
            background: #f2e5cf;
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.3), inset 0 1px 4px rgba(255, 255, 200, 0.8);
            cursor: pointer;
            transition: filter 0.05s ease;
        }
        canvas:active {
            filter: brightness(0.98);
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 18px;
            margin-top: 28px;
            margin-bottom: 16px;
            align-items: center;
        }

        .ctrl-group {
            background: #2c2118;
            padding: 8px 20px;
            border-radius: 60px;
            display: flex;
            gap: 12px;
            align-items: center;
            box-shadow: inset 0 1px 3px #5e3e2a, 0 5px 8px rgba(0, 0, 0, 0.3);
        }

        .ctrl-group label {
            color: #ffdfb3;
            font-weight: bold;
            letter-spacing: 1px;
            font-size: 1rem;
            text-shadow: 0 1px 1px black;
        }

        button {
            background: #e0b081;
            border: none;
            font-size: 1.3rem;
            font-weight: bold;
            width: 42px;
            height: 42px;
            border-radius: 100px;
            color: #2a1a0c;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 3px 0 #6b3f1c;
            font-family: monospace;
            font-weight: 800;
        }
        button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #6b3f1c;
        }
        .reset-btn, .undo-btn {
            background: #d9a066;
            width: auto;
            padding: 0 20px;
            font-size: 1.1rem;
            font-family: inherit;
            letter-spacing: 1px;
        }
        .undo-btn {
            background: #c2894f;
            color: #2f2218;
        }
        .disk-count-value {
            background: #1f140e;
            color: #f7cf9f;
            font-size: 1.5rem;
            font-weight: bold;
            min-width: 60px;
            text-align: center;
            border-radius: 40px;
            padding: 4px 12px;
            font-family: monospace;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            background: #ecd9b4;
            padding: 10px 24px;
            border-radius: 60px;
            margin-top: 12px;
            font-weight: bold;
            gap: 20px;
            flex-wrap: wrap;
        }
        .moves-box, .status-box, .undo-info {
            background: #2d241c;
            padding: 6px 18px;
            border-radius: 32px;
            color: #ffeaaf;
            font-size: 1.2rem;
            box-shadow: inset 0 1px 3px #61442e, 0 2px 4px rgba(0,0,0,0.2);
        }
        .moves-box span, .status-box span, .undo-info span {
            color: #ffbc6e;
            font-weight: 800;
            font-size: 1.4rem;
            margin-left: 8px;
        }
        .status-box {
            background: #2c3824;
        }
        .undo-info {
            background: #3e2a1f;
        }

        .game-footer {
            margin-top: 18px;
            text-align: center;
            background: #2c241bb3;
            backdrop-filter: blur(4px);
            border-radius: 60px;
            padding: 8px 16px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #fff2cf;
            text-shadow: 0 1px 3px #00000080;
            letter-spacing: 0.5px;
            border: 1px solid #ffd58c66;
            font-family: inherit;
        }
        .game-footer strong {
            color: #ffcd94;
        }

        @media (max-width: 650px) {
            .game-container { padding: 12px 16px 20px; }
            .ctrl-group { padding: 5px 12px; gap: 8px; }
            button { width: 36px; height: 36px; font-size: 1.2rem; }
            .stats { flex-direction: column; align-items: center; gap: 8px; }
            .game-footer { font-size: 0.7rem; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="game-panel">
        <canvas id="hanoiCanvas" width="800" height="400" style="width:100%; height:auto; max-width:800px; aspect-ratio:800/400"></canvas>

        <div class="controls">
            <div class="ctrl-group">
                <label>🏺 盘数</label>
                <button id="decDisks">−</button>
                <span id="diskCountDisplay" class="disk-count-value">3</span>
                <button id="incDisks">+</button>
            </div>
            <div class="ctrl-group">
                <button id="undoBtn" class="undo-btn" title="撤销上一步 (最多3步)">↩️ 撤销</button>
                <button id="resetGameBtn" class="reset-btn">🔄 重置</button>
            </div>
        </div>

        <div class="stats">
            <div class="moves-box">📦 移动步数 <span id="moveCount">0</span></div>
            <div class="undo-info">⏪ 可撤销步数 <span id="undoSteps">0</span></div>
            <div class="status-box">✨ 状态 <span id="gameStatus">游戏中</span></div>
        </div>
        
        <div class="game-footer">
            💡 <strong>玩法</strong> ：点击柱子选中 → 再点击另一柱子移动 | <strong>规则</strong> ：大盘不可压小盘 | 全部移至最右侧获胜<br>
            🧩 <strong>撤销</strong> ：支持回退最近 <strong>3</strong> 步，助你轻松破局！
        </div>
    </div>
</div>

<script>
    (function(){
        // ---------- DOM 元素 ----------
        const canvas = document.getElementById('hanoiCanvas');
        const ctx = canvas.getContext('2d');

        const diskCountSpan = document.getElementById('diskCountDisplay');
        const moveCountSpan = document.getElementById('moveCount');
        const gameStatusSpan = document.getElementById('gameStatus');
        const undoStepsSpan = document.getElementById('undoSteps');
        const decBtn = document.getElementById('decDisks');
        const incBtn = document.getElementById('incDisks');
        const resetBtn = document.getElementById('resetGameBtn');
        const undoBtn = document.getElementById('undoBtn');

        // ---------- 游戏配置 ----------
        let totalDisks = 3;
        const MIN_DISKS = 1;
        const MAX_DISKS = 8;

        let pegs = [[], [], []];
        let moves = 0;
        let gameWon = false;
        let selectedPeg = null;

        // ---------- 撤销功能 ----------
        let historyStack = [];
        const MAX_UNDO = 3;

        function pushHistory(from, to) {
            historyStack.push({ from, to });
            while (historyStack.length > MAX_UNDO) historyStack.shift();
            updateUndoDisplay();
        }

        function clearHistory() {
            historyStack = [];
            updateUndoDisplay();
        }

        function updateUndoDisplay() {
            undoStepsSpan.innerText = `${historyStack.length}`;
        }

        function undoLastMove() {
            if (gameWon) {
                flashMessage("游戏已胜利，请重置后再撤销", "#f5bc70");
                return false;
            }
            if (historyStack.length === 0) {
                flashMessage("没有可撤销的步骤", "#ffaa66");
                return false;
            }
            const last = historyStack.pop();
            const { from, to } = last;
            if (pegs[to].length === 0) {
                updateUndoDisplay();
                return false;
            }
            const disk = pegs[to][pegs[to].length - 1];
            if (pegs[from].length > 0) {
                const topDiskFrom = pegs[from][pegs[from].length - 1];
                if (disk > topDiskFrom) {
                    historyStack.push(last);
                    updateUndoDisplay();
                    flashMessage("撤销失败: 规则冲突", "#e34d4d");
                    return false;
                }
            }
            const movedDisk = pegs[to].pop();
            pegs[from].push(movedDisk);
            moves--;
            updateMoveDisplay();
            
            gameWon = false;
            if (pegs[2].length === totalDisks) gameWon = true;
            updateStatusDisplay();
            selectedPeg = null;
            drawCanvas();
            updateUndoDisplay();
            flashMessage("撤销成功 ✓", "#a5d6a5");
            return true;
        }

        function flashMessage(msg, bgColor) {
            const statusSpan = gameStatusSpan;
            const originalText = statusSpan.innerText;
            const originalColor = statusSpan.style.color;
            statusSpan.innerText = msg;
            statusSpan.style.color = "#fff4cf";
            statusSpan.style.backgroundColor = bgColor || "#4a2f1a";
            statusSpan.style.transition = "0.2s";
            statusSpan.style.padding = "2px 8px";
            statusSpan.style.borderRadius = "30px";
            setTimeout(() => {
                statusSpan.innerText = originalText;
                statusSpan.style.backgroundColor = "";
                statusSpan.style.color = originalColor;
                statusSpan.style.padding = "";
            }, 800);
        }

        // ---------- 几何参数 ----------
        const CANVAS_W = 800;
        const CANVAS_H = 400;
        const PEG_X = [200, 400, 600];
        const BASE_Y = 330;
        const PEG_TOP_Y = 110;
        const PEG_WIDTH = 14;
        const DISK_HEIGHT = 32;
        const MIN_DISK_W = 42;
        const MAX_DISK_W = 156;

        function getDiskWidth(diskValue) {
            if (totalDisks === 1) return (MIN_DISK_W + MAX_DISK_W) / 2;
            const ratio = (diskValue - 1) / (totalDisks - 1);
            return MIN_DISK_W + ratio * (MAX_DISK_W - MIN_DISK_W);
        }

        function initGame() {
            pegs = [[], [], []];
            for (let i = totalDisks; i >= 1; i--) pegs[0].push(i);
            moves = 0;
            gameWon = false;
            selectedPeg = null;
            clearHistory();
            updateMoveDisplay();
            updateStatusDisplay();
            drawCanvas();
        }

        function updateMoveDisplay() {
            moveCountSpan.innerText = moves;
        }

        function updateStatusDisplay() {
            if (gameWon) {
                gameStatusSpan.innerText = '🎉 胜利! 🎉';
                gameStatusSpan.style.color = '#f9d371';
            } else {
                gameStatusSpan.innerText = '🎯 游戏中';
                gameStatusSpan.style.color = '#ffeaaf';
            }
        }

        function checkVictory() {
            if (!gameWon && pegs[2].length === totalDisks) {
                gameWon = true;
                selectedPeg = null;
                updateStatusDisplay();
                drawCanvas();
                return true;
            }
            return false;
        }

        function tryMove(from, to) {
            if (from === to) return false;
            const srcPeg = pegs[from];
            const dstPeg = pegs[to];
            if (srcPeg.length === 0) return false;
            const srcDisk = srcPeg[srcPeg.length - 1];
            if (dstPeg.length > 0) {
                const dstDisk = dstPeg[dstPeg.length - 1];
                if (srcDisk > dstDisk) return false;
            }
            const moved = srcPeg.pop();
            dstPeg.push(moved);
            moves++;
            updateMoveDisplay();
            pushHistory(from, to);
            drawCanvas();
            checkVictory();
            return true;
        }

        function handlePegClick(pegIndex) {
            if (gameWon) return;
            if (selectedPeg === null) {
                if (pegs[pegIndex].length > 0) {
                    selectedPeg = pegIndex;
                    drawCanvas();
                }
                return;
            }
            const success = tryMove(selectedPeg, pegIndex);
            selectedPeg = null;
            drawCanvas();
            if (!success && selectedPeg !== pegIndex) {
                canvas.style.transition = 'box-shadow 0.08s';
                canvas.style.boxShadow = '0 0 0 3px #e34d4d, 0 12px 20px rgba(0,0,0,0.3)';
                setTimeout(() => { canvas.style.boxShadow = ''; }, 200);
            }
        }

        function resetGame() {
            initGame();
            drawCanvas();
        }

        function changeDisks(delta) {
            let newVal = totalDisks + delta;
            if (newVal < MIN_DISKS) newVal = MIN_DISKS;
            if (newVal > MAX_DISKS) newVal = MAX_DISKS;
            if (newVal === totalDisks) return;
            totalDisks = newVal;
            diskCountSpan.innerText = totalDisks;
            initGame();
            drawCanvas();
        }

        // ---------- 绘图 ----------
        function drawCanvas() {
            if (!ctx) return;
            ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
            
            // 底座
            ctx.fillStyle = '#c8aa6e';
            ctx.fillRect(0, BASE_Y - 8, CANVAS_W, 48);
            ctx.fillStyle = '#b87c4f';
            ctx.fillRect(0, BASE_Y - 4, CANVAS_W, 12);
            ctx.fillStyle = '#e7c8a2';
            ctx.fillRect(0, BASE_Y + 2, CANVAS_W, 12);
            ctx.strokeStyle = '#794f2b';
            ctx.lineWidth = 1;
            for(let i=0;i<12;i++) {
                ctx.beginPath();
                ctx.moveTo(20 + i*70, BASE_Y-2);
                ctx.lineTo(40 + i*70, BASE_Y+6);
                ctx.stroke();
            }

            // 柱子
            for (let i = 0; i < 3; i++) {
                const x = PEG_X[i];
                const grad = ctx.createLinearGradient(x-8, PEG_TOP_Y, x+8, BASE_Y);
                grad.addColorStop(0, '#b87a45');
                grad.addColorStop(1, '#63381c');
                ctx.fillStyle = grad;
                ctx.shadowBlur = 3;
                ctx.fillRect(x - PEG_WIDTH/2, PEG_TOP_Y, PEG_WIDTH, BASE_Y - PEG_TOP_Y);
                ctx.fillStyle = '#eeb76b';
                ctx.beginPath();
                ctx.ellipse(x, PEG_TOP_Y-4, 12, 7, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#d18f47';
                ctx.beginPath();
                ctx.ellipse(x, PEG_TOP_Y-2, 9, 5, 0, 0, Math.PI*2);
                ctx.fill();
            }

            // 绘制盘子 (包含数字完美居中)
            for (let p = 0; p < 3; p++) {
                const stack = pegs[p];
                const pegCenterX = PEG_X[p];
                for (let level = 0; level < stack.length; level++) {
                    const diskVal = stack[level];
                    const width = getDiskWidth(diskVal);
                    const rectX = pegCenterX - width/2;
                    const yPos = BASE_Y - (level + 1) * DISK_HEIGHT;
                    
                    // 盘子渐变填充
                    const gradDisk = ctx.createLinearGradient(rectX, yPos, rectX+width, yPos+DISK_HEIGHT);
                    const hue = 25 + diskVal * 8;
                    gradDisk.addColorStop(0, `hsl(${hue}, 75%, 65%)`);
                    gradDisk.addColorStop(1, `hsl(${hue}, 80%, 45%)`);
                    ctx.fillStyle = gradDisk;
                    ctx.shadowBlur = 2;
                    ctx.beginPath();
                    ctx.roundRect(rectX, yPos, width, DISK_HEIGHT-2, 12);
                    ctx.fill();
                    ctx.strokeStyle = '#ffd58c';
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.roundRect(rectX, yPos, width, DISK_HEIGHT-2, 12);
                    ctx.stroke();
                    
                    // ===== 数字居中绘制 =====
                    // 设置字体 (大小约为盘子高度的 60%，保证视觉舒适)
                    const fontSize = Math.floor(DISK_HEIGHT * 0.58);
                    ctx.font = `bold ${fontSize}px "Segoe UI", "JetBrains Mono", system-ui`;
                    ctx.textBaseline = "middle";
                    ctx.shadowBlur = 0;
                    
                    const text = `${diskVal}`;
                    const textMetrics = ctx.measureText(text);
                    const textWidth = textMetrics.width;
                    // 水平居中: 盘子左边缘 + (盘子宽度 - 文本宽度)/2
                    const textX = rectX + (width - textWidth) / 2;
                    // 垂直居中: 盘子顶边 + 盘子高度/2
                    const textY = yPos + DISK_HEIGHT / 2;
                    
                    // 先绘制深色阴影效果 (轻微偏移)
                    ctx.fillStyle = '#2c1c0c';
                    ctx.fillText(text, textX + 1, textY + 1);
                    // 再绘制亮色主体
                    ctx.fillStyle = '#fff2cf';
                    ctx.fillText(text, textX, textY);
                    // 增加一层高光增强可读性
                    ctx.fillStyle = '#FFE5B4';
                    ctx.fillText(text, textX - 1, textY - 1);
                }
            }

            // 选中高亮
            if (selectedPeg !== null && !gameWon) {
                const x = PEG_X[selectedPeg];
                ctx.shadowBlur = 0;
                ctx.beginPath();
                ctx.arc(x, PEG_TOP_Y - 12, 26, 0, Math.PI*2);
                ctx.fillStyle = '#ffd966aa';
                ctx.fill();
                ctx.beginPath();
                ctx.arc(x, PEG_TOP_Y - 12, 18, 0, Math.PI*2);
                ctx.fillStyle = '#ffb347dd';
                ctx.fill();
                ctx.beginPath();
                ctx.arc(x, PEG_TOP_Y - 12, 32, 0, Math.PI*2);
                ctx.fillStyle = '#ffb34733';
                ctx.fill();
                for(let s=0;s<3;s++){
                    ctx.fillStyle = '#f5bc70';
                    ctx.beginPath();
                    ctx.arc(x + (s-1)*8, PEG_TOP_Y - 20, 4, 0, Math.PI*2);
                    ctx.fill();
                }
            }

            // 胜利特效
            if (gameWon) {
                for (let i = 0; i < 12; i++) {
                    const t = Date.now() / 500 + i;
                    const xOff = 40 + i * 70 + Math.sin(t) * 6;
                    const yOff = 70 + Math.cos(t*1.3) * 12;
                    ctx.fillStyle = `hsl(${45 + i*20}, 80%, 65%)`;
                    ctx.beginPath();
                    ctx.arc(xOff, yOff, 5, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle = `hsl(${30 + i*30}, 85%, 60%)`;
                    ctx.beginPath();
                    ctx.arc(xOff-3, yOff-2, 3, 0, Math.PI*2);
                    ctx.fill();
                }
                ctx.font = "bold 36px 'Segoe UI', system-ui";
                ctx.fillStyle = "#f5bc70cc";
                ctx.fillText("✨ VICTORY ✨", CANVAS_W/2-130, 60);
            }

            // 柱子下方文字优化（清晰醒目）
            ctx.shadowBlur = 0;
            ctx.textBaseline = "middle";
            for (let i = 0; i < 3; i++) {
                const x = PEG_X[i];
                let label = "";
                if (i === 0) label = "起 始 柱";
                else if (i === 1) label = "辅 助 柱";
                else label = "目 标 柱";
                
                ctx.font = "bold 20px 'Segoe UI', 'Poppins', system-ui";
                const textWidth = ctx.measureText(label).width;
                const bgX = x - textWidth/2 - 12;
                const bgY = BASE_Y + 12;
                const bgW = textWidth + 24;
                const bgH = 32;
                ctx.fillStyle = "#1e1710dd";
                ctx.shadowBlur = 4;
                ctx.fillRect(bgX, bgY, bgW, bgH);
                ctx.strokeStyle = "#f5c27b";
                ctx.lineWidth = 1.5;
                ctx.strokeRect(bgX, bgY, bgW, bgH);
                
                ctx.font = "bold 20px 'Segoe UI', 'Poppins', system-ui";
                ctx.fillStyle = "#FFF3E0";
                ctx.shadowBlur = 2;
                ctx.fillText(label, x - textWidth/2, BASE_Y + 28);
                ctx.fillStyle = "#FFD58C";
                ctx.fillText(label, x - textWidth/2 - 1, BASE_Y + 27);
            }
            // 额外英文简写
            ctx.font = "bold 14px monospace";
            ctx.fillStyle = "#EEDDAA";
            ctx.fillText("A", PEG_X[0]-8, BASE_Y + 52);
            ctx.fillText("B", PEG_X[1]-8, BASE_Y + 52);
            ctx.fillText("C", PEG_X[2]-8, BASE_Y + 52);
            ctx.shadowBlur = 0;
        }

        // roundRect 工具
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                this.moveTo(x+r, y);
                this.lineTo(x+w-r, y);
                this.quadraticCurveTo(x+w, y, x+w, y+r);
                this.lineTo(x+w, y+h-r);
                this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
                this.lineTo(x+r, y+h);
                this.quadraticCurveTo(x, y+h, x, y+h-r);
                this.lineTo(x, y+r);
                this.quadraticCurveTo(x, y, x+r, y);
                return this;
            };
        }

        // 坐标转换与点击
        function getPegIndexFromClick(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let canvasX = (clientX - rect.left) * scaleX;
            let canvasY = (clientY - rect.top) * scaleY;
            canvasX = Math.min(Math.max(0, canvasX), CANVAS_W);
            canvasY = Math.min(Math.max(0, canvasY), CANVAS_H);
            let minDist = 75;
            let hitIndex = -1;
            for (let i = 0; i < PEG_X.length; i++) {
                const dx = Math.abs(canvasX - PEG_X[i]);
                if (dx < minDist && canvasY >= PEG_TOP_Y - 20 && canvasY <= BASE_Y + 50) {
                    minDist = dx;
                    hitIndex = i;
                }
            }
            if (hitIndex === -1 && canvasY > PEG_TOP_Y-30 && canvasY < BASE_Y+55) {
                for (let i=0;i<PEG_X.length;i++) {
                    if (Math.abs(canvasX - PEG_X[i]) < 55) hitIndex = i;
                }
            }
            return hitIndex;
        }

        function onCanvasClick(e) {
            if (gameWon) {
                canvas.style.filter = 'drop-shadow(0 0 4px gold)';
                setTimeout(()=> canvas.style.filter = '', 300);
                return;
            }
            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
                e.preventDefault();
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            const pegIdx = getPegIndexFromClick(clientX, clientY);
            if (pegIdx !== -1) {
                handlePegClick(pegIdx);
            } else {
                if (selectedPeg !== null) {
                    selectedPeg = null;
                    drawCanvas();
                }
            }
        }

        canvas.addEventListener('click', onCanvasClick);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const pegIdx = getPegIndexFromClick(touch.clientX, touch.clientY);
            if (pegIdx !== -1) {
                handlePegClick(pegIdx);
            } else if (selectedPeg !== null) {
                selectedPeg = null;
                drawCanvas();
            }
        }, { passive: false });

        decBtn.addEventListener('click', () => changeDisks(-1));
        incBtn.addEventListener('click', () => changeDisks(1));
        resetBtn.addEventListener('click', () => resetGame());
        undoBtn.addEventListener('click', () => undoLastMove());

        window.addEventListener('keydown', (e) => {
            if (e.key === 'r' || e.key === 'R') { e.preventDefault(); resetGame(); }
            if (e.key === 'u' || e.key === 'U') { e.preventDefault(); undoLastMove(); }
        });

        initGame();
        drawCanvas();
        window.addEventListener('resize', () => drawCanvas());
    })();
</script>
</body>
</html>
